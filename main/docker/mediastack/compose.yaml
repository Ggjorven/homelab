networks:
  internalnetwork:
    external: true

  externalnetwork:
    external: true

services:
  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    # user: ${PUID}:${PGID} # linuxserver containers handle this with environment PUID, PGID
    environment:
      - PUID=0 # ${PUID} # Jellyfin needs root for GPU access
      - PGID=0 # ${PGID} # Jellyfin needs root for GPU access 
      - TZ=${TZ}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - NVIDIA_VISIBLE_DEVICES=all
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.50
      externalnetwork:
        ipv4_address: 172.40.0.50
    volumes:
      - ./jellyfin:/config
      - /data:/data
      - /mnt/nas:/mnt/nas
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8096:8096
      - 7359:7359/udp # Service Discovery
      - 1900:1900/udp # Client Discovery
    runtime: nvidia
    gpus: all
    healthcheck:
      test: curl -s http://localhost:8096/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr    
    user: ${PUID}:${PGID}   
    init: true
    environment:
      # - PUID=${PUID}
      # - PGID=${PGID}
      - TZ=${TZ}
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.51
    volumes:
      - ./seerr:/app/config
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 5055:5055
    depends_on:
      - jellyfin
    healthcheck:
      test: wget -qO- http://localhost:5055/api/v1/status
      timeout: 10s
      interval: 30s
      retries: 3
    restart: unless-stopped

  streamystats:
    image: ghcr.io/fredrikburmester/streamystats-aio:${VERSION:-latest}
    container_name: streamystats
    # user: ${PUID}:${PGID} # Untested without root
    environment:
      # - PUID=${PUID}
      # - PGID=${PGID}
      - TZ=${TZ}
      - POSTGRES_DB=streamystats
      - POSTGRES_USER=${STREAMYSTATS_POSTGRES_USER}
      - POSTGRES_PASSWORD=${STREAMYSTATS_POSTGRES_PASSWORD}
      - POSTGRES_HOST_AUTH_METHOD=scram-sha-256
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
      - DATABASE_URL=postgresql://${STREAMYSTATS_POSTGRES_USER}:${STREAMYSTATS_POSTGRES_PASSWORD}@localhost:5432/streamystats
      - SESSION_SECRET=${STREAMYSTATS_JWT_SECRET}
      # Stable encryption key for server action closures (prevents session breakage on redeploy)
      - NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${STREAMYSTATS_SERVER_KEY}
      - NODE_ENV=production
      # Job server cron configuration (optional)
      - SESSION_POLL_INTERVAL_MS=5000
      - CRON_ACTIVITY_SYNC=*/1 * * * *
      - CRON_RECENT_ITEMS_SYNC=*/1 * * * *
      - CRON_USER_SYNC=*/1 * * * *
      - CRON_PEOPLE_SYNC=*/15 * * * *
      - CRON_EMBEDDINGS_SYNC=*/15 * * * *
      - CRON_GEOLOCATION_SYNC=*/5 * * * *
      - CRON_FINGERPRINT_SYNC=0 4 * * *
      - CRON_JOB_CLEANUP=*/1 * * * *
      - CRON_OLD_JOB_CLEANUP=0 3 * * *
      - CRON_FULL_SYNC=0 2 * * *
      - CRON_DELETED_ITEMS_CLEANUP=0 * * * *
      - SKIP_STARTUP_FULL_SYNC=false
    volumes:
      - ./streamystats:/var/lib/postgresql/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 3000:3000
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.52
    healthcheck:
      test: sh -c "pg_isready -h localhost && curl -f http://127.0.0.1:3000/api/health && curl -f http://127.0.0.1:3005/health"
      timeout: 5s
      interval: 30s
      retries: 3
    restart: unless-stopped

  medialyze:
    image: ghcr.io/frederikemmer/medialyze:latest
    container_name: medialyze
    user: ${PUID}:${PGID}   
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - CONFIG_PATH=/config
      - MEDIA_ROOT=/media
      - APP_PORT=8100
      - HOST_PORT=8100
    volumes:
      - ./medialyze:/config
      - ${MEDIALYZE_MEDIA_LOCATION}:/media:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8100:8100
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.53
    healthcheck:
      test: wget -qO- http://localhost:8100
      timeout: 5s
      interval: 30s
      retries: 3
    restart: unless-stopped
