networks:
  internalnetwork:
    external: true
  externalnetwork:
    external: true

services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:edge-alpine
    container_name: cloudflare-ddns
    environment:
      - TZ=${TZ}
      - CF_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAINS=${AUTHENTIK_DOMAIN},${JELLYFIN_DOMAIN},${NAVIDROME_DOMAIN}
      - PROXIED=true
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.240
    healthcheck:
      test: sh -c "wget -qO- http://localhost:8001/healthz | grep -q 'OK' || exit 1"
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: certbot
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    volumes:
      - ./certs:/etc/letsencrypt
    entrypoint: >
      sh -c "
      cd /
      &&
      echo 'dns_cloudflare_api_token = ${CLOUDFLARE_API_TOKEN}' > cloudflare.ini
      &&
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      -d ${AUTHENTIK_DOMAIN}
      -d ${JELLYFIN_DOMAIN}
      -d ${NAVIDROME_DOMAIN}
      --non-interactive
      --agree-tos
      -m $$CERTBOT_EMAIL
      --keep-until-expiring
      && while true; do
        sleep 12h;
        certbot renew --quiet;
      done
      "
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.242
    healthcheck:
      test: sh -c "certbot certificates 2>/dev/null | grep -q 'VALID' || exit 1"
      interval: 12h
      timeout: 30s
      retries: 2
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    environment:
      - AUTHENTIK_DOMAIN=${AUTHENTIK_DOMAIN}
      - JELLYFIN_DOMAIN=${JELLYFIN_DOMAIN}
      - NAVIDROME_DOMAIN=${NAVIDROME_DOMAIN}
      - AUTHENTIK_IP=172.40.0.243
      - JELLYFIN_IP=172.40.0.50
      - NAVIDROME_IP=172.40.0.60
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/logs:/var/log/nginx
      - ./certs:/etc/letsencrypt:ro
    ports:
      - 80:80
      - 443:443
    # depends_on:
    #  - authentik-server
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.241
    healthcheck:
      test: sh -c "nginx -t || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped

