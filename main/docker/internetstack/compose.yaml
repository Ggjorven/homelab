networks:
  internalnetwork:
    external: true
  externalnetwork:
    external: true

services:
  cloudflare-ddns:
    image: favonia/cloudflare-ddns:edge-alpine
    container_name: cloudflare-ddns
    environment:
      - TZ=${TZ}
      - CF_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAINS=${AUTH_DOMAIN},${JELLYFIN_DOMAIN},${NAVIDROME_DOMAIN}
      - PROXIED=true
      - IP6_PROVIDER=none
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.240
    healthcheck:
      test: sh -c "nslookup cloudflare.com || exit 1"
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  certbot:
    image: certbot/dns-cloudflare:latest
    container_name: certbot
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    volumes:
      - ./certs:/etc/letsencrypt
    entrypoint: >
      sh -c "
      cd /
      &&
      echo 'dns_cloudflare_api_token = ${CLOUDFLARE_API_TOKEN}' > cloudflare.ini
      &&
      certbot certonly
      --dns-cloudflare
      --dns-cloudflare-credentials cloudflare.ini
      --dns-cloudflare-propagation-seconds 30
      -d ${AUTH_DOMAIN}
      -d ${JELLYFIN_DOMAIN}
      -d ${NAVIDROME_DOMAIN}
      --non-interactive
      --agree-tos
      -m $$CERTBOT_EMAIL
      --keep-until-expiring
      && while true; do
        sleep 12h;
        certbot renew --quiet;
      done
      "
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.242
    healthcheck:
      test: sh -c "certbot certificates 2>/dev/null | grep -q 'VALID' || exit 1"
      interval: 12h
      timeout: 30s
      retries: 2
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    environment:
      - AUTH_DOMAIN=${AUTH_DOMAIN}
      - JELLYFIN_DOMAIN=${JELLYFIN_DOMAIN}
      - NAVIDROME_DOMAIN=${NAVIDROME_DOMAIN}
      - AUTH_IP=172.40.0.243
      - JELLYFIN_IP=172.40.0.50
      - NAVIDROME_IP=172.40.0.60
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./nginx/logs:/var/log/nginx
      - ./certs:/etc/letsencrypt:ro
    ports:
      - 80:80
      - 443:443
    depends_on:
      # auth
      certbot:
        condition: service_healthy
    networks:
      externalnetwork:
        ipv4_address: 172.40.0.241
    healthcheck:
      test: sh -c "nginx -t || exit 1"
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped

