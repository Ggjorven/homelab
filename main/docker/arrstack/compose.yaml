networks:
  internalnetwork:
    external: true

  externalnetwork:
    external: true

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    # user: ${PUID}:${PGID} # This container requires joining another containers network
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./prowlarr:/config
      - /etc/localtime:/etc/localtime:ro
    network_mode: container:gluetun
    healthcheck:
      test: sh -c "ping -c1 8.8.8.8 >/dev/null 2>&1 && nslookup www.google.com >/dev/null 2>&1 && wget -qO- http://localhost:9696 >/dev/null 2>&1 && curl -s http://localhost:9696/ping || exit 1"
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    # user: ${PUID}:${PGID} # linuxserver containers handle this with environment PUID, PGID
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./sonarr:/config
      - /mnt/nas:/mnt/nas
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8989:8989
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.40
    healthcheck:
      test: sh -c "wget -qO- http://localhost:8989 >/dev/null 2>&1 && curl -s http://localhost:8989/ping"
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true 
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    # user: ${PUID}:${PGID} # linuxserver containers handle this with environment PUID, PGID
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./radarr:/config
      - /mnt/nas:/mnt/nas
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 7878:7878
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.41
    healthcheck:
      test: sh -c "wget -qO- http://localhost:7878 >/dev/null 2>&1 && curl -s http://localhost:7878/ping"
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped

  lidarr:
    container_name: lidarr
    image: lscr.io/linuxserver/lidarr:latest
    # user: ${PUID}:${PGID} # linuxserver containers handle this with environment PUID, PGID
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./lidarr:/config
      - /mnt/nas:/mnt/nas
      - ${SOULARR_DOWNLOAD_DIRECTORY}:/soularr/downloads
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 8686:8686
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.42
    healthcheck:
      test: sh -c "wget -qO- http://localhost:8686 >/dev/null 2>&1 && curl -s http://localhost:8686/ping"
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped

  slskd: # TODO: Move to downloadstack
    image: slskd/slskd
    container_name: slskd
    user: ${PUID}:${PGID}
    environment:
      # - PUID=${PUID}
      # - PGID=${PGID}
      - TZ=${TZ}
      - SLSKD_SLSK_USERNAME=${SOULSEEK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SOULSEEK_PASSWORD}
      # - SLSKD_SLSK_DESCRIPTION=Cool description about you
      - SLSKD_DOWNLOADS_DIR=/downloads
      - SLSKD_INCOMPLETE_DIR=/incomplete
      - SLSKD_SLSK_LISTEN_IP_ADDRESS=0.0.0.0
      - SLSKD_SLSK_LISTEN_PORT=50300
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_API_KEY=${SLSKD_API_KEY}
    volumes:
      - ./slskd:/app
      - ${SOULARR_DOWNLOAD_DIRECTORY}:/downloads
      - ${SOULARR_INCOMPLETE_DIRECTORY}:/incomplete
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 5030:5030
      - 5031:5031
      - 50300:50300
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.43
    healthcheck:
      test: wget -qO- http://localhost:5030/healthcheck
      interval: 60s
      timeout: 3s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped

  soularr:
    image: mrusse08/soularr:latest
    container_name: soularr
    user: ${PUID}:${PGID}
    environment:
      # - PUID=${PUID}
      # - PGID=${PGID}
      - TZ=${TZ}
      - SCRIPT_INTERVAL=${SOULARR_DOWNLOAD_INTERVAL}
    volumes:
      - ./soularr:/data
      - ${SOULARR_DOWNLOAD_DIRECTORY}:/downloads
      - /etc/localtime:/etc/localtime:ro
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.44
    depends_on:
      lidarr:
        condition: service_healthy
      slskd:
        condition: service_healthy
    healthcheck:
      test: sh -c "wget -qO- http://172.39.0.42:8686 >/dev/null 2>&1 && wget -qO- http://172.39.0.43:5030 || exit 1"
      interval: 60s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    # user: ${PUID}:${PGID} # linuxserver containers handle this with environment PUID, PGID
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./bazarr:/config
      - /mnt/nas:/mnt/nas
      - /etc/localtime:/etc/localtime:ro
    ports:
      - 6767:6767
    networks:
      internalnetwork:
        ipv4_address: 172.39.0.45
    healthcheck:
      test: curl -s http://localhost:6767 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - deunhealth.restart.on.unhealthy=true
    restart: unless-stopped
